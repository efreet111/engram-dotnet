services:
  engram:
    image: engram-dotnet:latest
    build:
      # Contexto en raíz del proyecto para que COPY . . funcione correctamente
      context: ..
      dockerfile: docker/Dockerfile
    container_name: engram
    restart: unless-stopped

    ports:
      - "${ENGRAM_HOST_PORT:-7437}:7437"

    volumes:
      # Montar el directorio de datos desde el host — configurar ENGRAM_DATA_PATH en docker/.env
      - ${ENGRAM_DATA_PATH}:/app/database

    environment:
      - ENGRAM_DATA_DIR=/app/database
      - ENGRAM_PORT=7437
      # Opcional — habilitar auth JWT (descomentar y cambiar el valor)
      # - ENGRAM_JWT_SECRET=cambia_esto_por_un_secreto_seguro
      # Opcional — CORS si accedés al servidor desde un dashboard web
      # - ENGRAM_CORS_ORIGINS=http://truenas.local

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7437/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
