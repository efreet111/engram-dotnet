version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: engram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: engram
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: ${ENGRAM_PG_PASSWORD:-engram-secret}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 10s
      timeout: 5s
      retries: 5

  engram:
    image: engram-dotnet:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENGRAM_VERSION: v1.3.0
    container_name: engram
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "7437:7437"

    volumes:
      # Montar el dataset de TrueNAS donde se guardan los datos (solo para modo SQLite)
      # Cambiar la ruta izquierda por el path de tu dataset en TrueNAS
      # Ejemplo: /mnt/tank/engram:/data/engram
      - /mnt/tank/engram:/data/engram

    environment:
      # Backend selection: sqlite (default) | postgres
      ENGRAM_DB_TYPE: ${ENGRAM_DB_TYPE:-sqlite}
      ENGRAM_DATA_DIR: /data/engram
      ENGRAM_PORT: "7437"
      # PostgreSQL connection string (required when ENGRAM_DB_TYPE=postgres)
      ENGRAM_PG_CONNECTION: "Host=postgres;Database=engram;Username=engram;Password=${ENGRAM_PG_PASSWORD:-engram-secret}"
      # Opcional — habilitar auth JWT (descomentar y cambiar el valor)
      # ENGRAM_JWT_SECRET: "cambia_esto_por_un_secreto_seguro"
      # Opcional — CORS si accedés al servidor desde un dashboard web
      # ENGRAM_CORS_ORIGINS: "http://truenas.local"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7437/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg-data:
