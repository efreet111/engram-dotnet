version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Engram — Docker Compose (PostgreSQL externo de TrueNAS Apps)
#
# REQUISITOS:
#   1. PostgreSQL instalado como App en TrueNAS SCALE
#   2. Puerto de PostgreSQL mapeado al host (ej: 5432 → 5432)
#   3. Archivo .env con las credenciales (ver .env.example)
#
# USO:
#   cp .env.example .env          # editar con tus credenciales
#   docker compose up -d --build  # construir y levantar
#   docker compose logs -f        # ver logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  engram:
    image: engram-dotnet:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        ENGRAM_VERSION: v1.3.0
    container_name: engram
    restart: unless-stopped

    ports:
      - "7437:7437"

    # Permite acceder al PostgreSQL del host (TrueNAS Apps) desde dentro del container
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Dataset de TrueNAS para datos (SQLite fallback, exports, etc.)
      # Ajustar la ruta izquierda si tu dataset está en otro lugar
      - /mnt/Pool_8TB/engram_data:/data/engram

    environment:
      # Backend selection: sqlite (default) | postgres
      ENGRAM_DB_TYPE: ${ENGRAM_DB_TYPE:-postgres}
      ENGRAM_DATA_DIR: /data/engram
      ENGRAM_PORT: "7437"

      # PostgreSQL connection string — apunta al PostgreSQL de TrueNAS Apps
      # host.docker.internal se resuelve a la IP del host via extra_hosts
      ENGRAM_PG_CONNECTION: "Host=${ENGRAM_PG_HOST:-host.docker.internal};Port=${ENGRAM_PG_PORT:-5432};Database=${ENGRAM_PG_DATABASE:-engram};Username=${ENGRAM_PG_USER:-engram};Password=${ENGRAM_PG_PASSWORD}"

      # Opcional — habilitar auth JWT (descomentar y cambiar el valor)
      # ENGRAM_JWT_SECRET: "cambia_esto_por_un_secreto_seguro"

      # Opcional — CORS si accedés al servidor desde un dashboard web
      # ENGRAM_CORS_ORIGINS: "http://truenas.local:8080"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7437/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
